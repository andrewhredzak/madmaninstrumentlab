    <script>
        const triggerWindowMs = 3000;
        const requiredPresses = 10;
        let keypressTimes = [];

        document.addEventListener("keydown", (event) => {
            if (event.key.toLowerCase() !== "m") {
                return;
            }

            const now = Date.now();
            keypressTimes.push(now);
            keypressTimes = keypressTimes.filter((time) => now - time <= triggerWindowMs);

            if (keypressTimes.length >= requiredPresses) {
                window.location.href = "MMI_proto/index.html";
            }
        });
    </script>
