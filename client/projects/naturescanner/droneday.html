<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U of A Drone Day | Andrew Hredzak</title>
    <link rel="icon" href="../../designassets/icons/snap_favicon_transcrop3.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa&family=IBM+Plex+Mono&family=Source+Code+Pro&family=Special+Gothic+Expanded+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../designassets/css/main.css">
</head>
<body>
    <div class="content">
        <div class="header-box">
            <h1>U of A Drone Day (April 5th, 2025)</h1>
            <nav>
                <a href="../../index.html">Home</a>
                <a href="/client/projects/naturescanner/naturescanner-dir.html">Nature Scanner</a>
            </nav>
        </div>

        <p>
            Photo gallery from U of A Drone Day, documenting the Nature Scanner project setup,
            University of Arizona Campus Agricultural Center, and proposed drone testing range.
        </p>

        <h2>Gallery</h2>
        <div class="gallery" id="droneday-gallery"></div>
        <div id="droneday-lightboxes"></div>
    </div>

    <script>
        const droneDayImages = [
            "IMG_8269.webp",
            "IMG_8294.webp",
            "IMG_8298.jpeg",
            "IMG_8305.webp",
            "IMG_8314.PNG",
            "IMG_8271.webp",
            "IMG_8300.jpeg",
            "IMG_8272.webp",
            "IMG_8273.webp",
            "IMG_8274.webp",
            "IMG_8275.webp",
            "IMG_8276.webp",
            "IMG_8277.webp",
            "IMG_8278.webp",
            "IMG_8279.webp",
            "IMG_8284.webp",
            "IMG_8285.webp",
            "IMG_8286.webp",
            "IMG_8287.webp",
            "IMG_8288.webp",
            "IMG_8303.webp",
            "IMG_8306.webp"
            
        ];

        const gallery = document.getElementById("droneday-gallery");
        const lightboxes = document.getElementById("droneday-lightboxes");

        droneDayImages.forEach((fileName, index) => {
            const imageNumber = index + 1;
            const imagePath = `../../designassets/images/droneday/${fileName}`;
            const imageAlt = `U of A Drone Day photo ${imageNumber}`;

            const galleryItem = document.createElement("a");
            galleryItem.href = `#img${imageNumber}`;

            const thumbnail = document.createElement("img");
            thumbnail.src = imagePath;
            thumbnail.alt = imageAlt;
            galleryItem.appendChild(thumbnail);
            gallery.appendChild(galleryItem);

            const lightbox = document.createElement("div");
            lightbox.id = `img${imageNumber}`;
            lightbox.className = "lightbox";

            const closeLink = document.createElement("a");
            closeLink.href = "#";
            closeLink.style.cssText = "position: absolute; top: 30px; right: 40px; text-decoration: none; font-size: 2.5rem; color: #aaa; font-family: Arial, sans-serif; z-index: 1100;";
            closeLink.innerHTML = "&#10005;";

            const fullImage = document.createElement("img");
            fullImage.src = imagePath;
            fullImage.alt = imageAlt;

            lightbox.appendChild(closeLink);
            lightbox.appendChild(fullImage);
            lightboxes.appendChild(lightbox);
        });
    </script>
</body>
</html>
